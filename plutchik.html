*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html, body { height: 100%; overflow: hidden; }

.app-hdr-row { display: flex; justify-content: space-between; align-items: flex-start; }

.app-hdr-title { font-size: 22px; font-weight: 700; letter-spacing: -0.3px; font-family: 'Playfair Display', Georgia, serif; }

.lang-toggle {

}
.lang-toggle button {
  padding: 6px 12px; background: none; border: none; color: #807c74;
  font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 500;
  cursor: pointer; transition: all .2s; letter-spacing: 1px;
}
.lang-toggle button.on { background: #d4a82a; color: #08080d; font-weight: 700; }

/* ── Nav ── */

.app-nav button {

  font-size: 13px; font-weight: 500; padding: 11px 20px; border-radius: 10px; cursor: pointer;
  transition: all .2s; min-height: 48px;

.app-nav button:hover { color: #ccc5b8; }
.app-nav button.on { color: #d4a82a; border-color: #d4a82a30; background: #d4a82a0a; }

/* ── Content scroll area ── */
.app-cnt { flex: 1; overflow-y: auto; scroll-behavior: smooth; min-height: 0; }

.app-cnt::-webkit-scrollbar-thumb { background: #807c74; border-radius: 2px; }

.wv-hint { font-size: 13px; color: #807c74; margin-top: 8px; text-align: center; font-weight: 400; }

.wheel-container { width: 100%; max-width: 380px; aspect-ratio: 1; }
.wheel-container svg { width: 100%; height: 100%; display: block; overflow: visible; touch-action: manipulation; }

.wheel-spin { animation: wspin .9s cubic-bezier(.3,0,.2,1); }
@keyframes wspin { 0% { transform: rotate(0); } 100% { transform: rotate(720deg); } }

/* ── Draw view ── */
.dv { display: flex; flex-direction: column; align-items: center; padding: 18px 18px 80px; }
.dv-toggle { display: flex; gap: 2px; margin-bottom: 14px; background: #0e0e15; border-radius: 10px; padding: 4px; border: 1px solid #1a1a24; }

.dv-btn:hover { background: #d4a82a; color: #08080d; }
.dv-btn:active { transform: scale(.97); }
.dv-btn:disabled { opacity: .3; cursor: wait; }

.overlay {
  position: fixed; inset: 0; background: #08080ddd; z-index: 100;

@media (min-width: 520px) { .overlay { align-items: center; } }
.modal {

@media (min-width: 520px) { .modal { border-radius: 14px; max-height: 84vh; } }

/* ── Soma cards ── */

.soma-text {

/* ── Footer ── */

.app-ftr p { font-family: 'DM Mono', monospace; font-size: 9px; color: #28283a; letter-spacing: .5px; text-align: center; }

@media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: .01ms !important; transition-duration: .01ms !important; } }

@media (max-width: 520px) {

function getDyad(id1, id2) {
  if (id1 === id2) return null;
  const key = [id1, id2].sort().join("+");
  const d = DYADS[key];
  return d ? { name: d[lang], type: d.type } : null;
}

function em(emotion) { return emotion[lang]; }

// ─── WHEEL GEOMETRY ─────────────────────────────────────────────────────────
const WCX = 200, WCY = 200;
function wPolar(r, deg) {
  const rad = (deg - 90) * Math.PI / 180;
  return { x: WCX + r * Math.cos(rad), y: WCY + r * Math.sin(rad) };
}
function wArc(r1, r2, startDeg, endDeg) {
  const f = n => n.toFixed(2);
  const a = wPolar(r1, startDeg), b = wPolar(r1, endDeg);
  const c = wPolar(r2, endDeg), d = wPolar(r2, startDeg);
  const lg = (endDeg - startDeg) > 180 ? 1 : 0;
  return `M${f(a.x)},${f(a.y)} A${r1},${r1},0,${lg},1,${f(b.x)},${f(b.y)} L${f(c.x)},${f(c.y)} A${r2},${r2},0,${lg},0,${f(d.x)},${f(d.y)}Z`;
}

// ─── RENDER WHEEL SVG ───────────────────────────────────────────────────────
function renderWheelSVG(opts = {}) {
  const { drawnIds, spinClass } = opts;
  const RINGS = [
    { r1: 34, r2: 72, opDef: 0.25, opSel: 0.50, opDim: 0.04 },
    { r1: 75, r2: 113, opDef: 0.50, opSel: 0.75, opDim: 0.04 },
    { r1: 116, r2: 155, opDef: 0.78, opSel: 1.00, opDim: 0.04 },
  ];
  const GAP = 2.8;
  let defs = '';
  EMOTIONS.forEach(e => {
    defs += `<filter id="g-${e.id}" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur in="SourceGraphic" stdDeviation="7" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>`;
  });

  let petals = '';
  EMOTIONS.forEach((e, i) => {
    const midDeg = i * 45, startDeg = midDeg - 22.5 + GAP, endDeg = midDeg + 22.5 - GAP;
    const lp = wPolar(175, midDeg);
    const isDrawn = drawnIds && drawnIds.includes(e.id);
    const anyActive = drawnIds && drawnIds.length > 0;
    const dimmed = anyActive && !isDrawn;
    const getOp = ring => isDrawn ? ring.opSel : dimmed ? ring.opDim : ring.opDef;

    petals += `<g data-eid="${e.id}" filter="${isDrawn ? `url(#g-${e.id})` : ''}" style="cursor:pointer" role="button" tabindex="0">`;
    petals += `<path d="${wArc(30, 160, startDeg - 3, endDeg + 3)}" fill="transparent"/>`;
    RINGS.forEach((ring, ri) => {
      petals += `<path d="${wArc(ring.r1, ring.r2, startDeg, endDeg)}" fill="${e.color}" fill-opacity="${getOp(ring)}" stroke="${isDrawn && ri === 2 ? e.color : 'none'}" stroke-width="${isDrawn ? 1.5 : 0}" stroke-opacity="0.5" style="transition:fill-opacity .35s"/>`;
    });
    const fill = isDrawn ? e.color : dimmed ? '#252530' : '#78756e';
    const fs = isDrawn ? '13.5' : '11.5';
    const fw = isDrawn ? '700' : '500';
    petals += `<text x="${lp.x}" y="${lp.y}" text-anchor="middle" dominant-baseline="central" fill="${fill}" font-size="${fs}" font-weight="${fw}" font-family="Lexend, sans-serif" letter-spacing="0.3" style="transition:all .35s;pointer-events:none">${em(e).name}</text>`;
    petals += `</g>`;
  });

  return `<div class="wheel-container"><svg viewBox="0 0 400 400" class="${spinClass || ''}" role="img" aria-label="${t('wheelLabel')}">
    <defs>${defs}</defs>
    <circle cx="${WCX}" cy="${WCY}" r="73" fill="none" stroke="#1e1e28" stroke-width="1"/>
    <circle cx="${WCX}" cy="${WCY}" r="114" fill="none" stroke="#1e1e28" stroke-width="1"/>
    <circle cx="${WCX}" cy="${WCY}" r="30" fill="#0c0c12" stroke="#1e1e28" stroke-width="1"/>
    <text x="${WCX}" y="${WCY - 1}" text-anchor="middle" fill="#44444f" font-size="7" font-family="Lexend, sans-serif" font-weight="600" letter-spacing="2.5">${t('wheelCenter1')}</text>
    <text x="${WCX}" y="${WCY + 10}" text-anchor="middle" fill="#33333d" font-size="6" font-family="Lexend, sans-serif" letter-spacing="1.5">${t('wheelCenter2')}</text>
    ${petals}
  </svg></div>`;
}

function openModal(emotionId) {
  modalTab = 'soma';
  modalGrad = 'mid';
  renderModal(emotionId);
  document.getElementById('overlay').classList.remove('hidden');
}

function closeModal() {
  document.getElementById('overlay').classList.add('hidden');
}

  document.getElementById('modal').innerHTML = `
    <div style="position:sticky;top:0;left:0;right:0;height:4px;background:${emotion.color};border-radius:18px 18px 0 0;z-index:1"></div>
    <div style="padding:22px 22px 14px;display:flex;justify-content:space-between;align-items:flex-start">
      <div>
        <div style="font-size:28px;margin-bottom:4px;color:${emotion.color}">${emotion.icon}</div>
        <div style="font-size:30px;font-weight:700;color:${emotion.color};font-family:'Playfair Display',Georgia,serif">${d.name}</div>
        <div style="font-family:'DM Mono',monospace;font-size:12px;color:#807c74;letter-spacing:1px">${lang === 'pl' ? emotion.en.name : emotion.pl.name}</div>
        <div style="font-size:13px;color:#807c74;margin-top:3px;font-weight:400">${d.vector}</div>
      </div>
      <button onclick="closeModal()" aria-label="${t('close')}" style="background:none;border:none;color:#807c74;font-size:26px;cursor:pointer;padding:4px 10px;font-family:'DM Mono',monospace;min-width:48px;min-height:48px;display:flex;align-items:center;justify-content:center">×</button>
    </div>
    <div style="display:flex;gap:0;padding:0 22px;border-bottom:1px solid #1a1a24">
      <button onclick="modalTab='soma';renderModal('${emotionId}')" style="${tabBtnStyle('soma')}">${t('tabSoma')}</button>
      <button onclick="modalTab='grad';renderModal('${emotionId}')" style="${tabBtnStyle('grad')}">${t('tabGrad')}</button>
    </div>
    <div style="padding:24px 22px 12px">
      ${modalTab === 'soma' ? `<div class="fade-in">${somaHTML}</div>` : `
        <div class="fade-in">
          <div style="display:flex;gap:8px;margin-bottom:22px">${gradBtns}</div>
          <div style="padding:20px;background:#16161f;border-radius:10px">
            <p class="soma-text">${d.grad[modalGrad]}</p>
          </div>
        </div>
      `}
    </div>
    <div style="padding:16px 22px 22px;display:flex;gap:10px;align-items:flex-start">
      <span style="color:#a85a48;font-size:16px;flex-shrink:0;margin-top:2px">◉</span>
      <span style="font-size:13px;line-height:1.7;color:#807c74;font-weight:300">${t('safetyNote')}</span>
    </div>
  `;
}

// ─── RENDER NAV ─────────────────────────────────────────────────────────────
function renderNav() {
  const items = [
    { id: 'wheel', label: t('navWheel') },
    { id: 'draw', label: t('navDraw') },
  ];
  document.getElementById('main-nav').innerHTML = items.map(n =>
    `<button class="${view === n.id ? 'on' : ''}" onclick="switchView('${n.id}')">${n.label}</button>`
  ).join('');
}

function switchView(v) {
  view = v;
  selectedEmotion = null;
  drawResult = null;
  spinning = false;
  renderNav();
  renderContent();
  document.getElementById('app-cnt').scrollTo({ top: 0, behavior: 'smooth' });
}

// ─── RENDER CONTENT ─────────────────────────────────────────────────────────
function renderContent() {
  const cnt = document.getElementById('app-cnt');
  if (view === 'wheel') {
    cnt.innerHTML = `
      <div class="wv">
        <div style="margin-bottom:10px">
          <div class="wv-quote">${t('wheelQuote')}</div>
          <div class="wv-sub">${t('wheelSub')}</div>
        </div>
        ${renderWheelSVG()}
        <div class="wv-hint">${t('wheelHint')}</div>
      </div>
    `;
    // Attach click handlers to wheel petals
    cnt.querySelectorAll('[data-eid]').forEach(g => {
      g.addEventListener('click', () => openModal(g.dataset.eid));
      g.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openModal(g.dataset.eid); } });
    });
  } else if (view === 'draw') {
    renderDrawView();
  }
}

function renderDrawView() {
  const cnt = document.getElementById('app-cnt');
  let html = '<div class="dv">';

  // Toggle
  html += `<div class="dv-toggle">
    <button class="${drawMode === 'single' ? 'on' : ''}" onclick="drawMode='single';drawResult=null;renderDrawView()">${t('solo')}</button>
    <button class="${drawMode === 'pair' ? 'on' : ''}" onclick="drawMode='pair';drawResult=null;renderDrawView()">${t('pair')}</button>
  </div>`;

  // Wheel
  html += renderWheelSVG({
    drawnIds: drawResult ? drawResult.ids : undefined,
    spinClass: spinning ? 'wheel-spin' : ''
  });

  // Result
  if (drawResult) {
    html += '<div class="fade-in" style="text-align:center;margin-top:18px">';
    if (drawResult.type === 'single') {
      const e = drawResult.emotion;
      const d = em(e);
      html += `<button onclick="openModal('${e.id}')" style="
        display:inline-flex;flex-direction:column;align-items:center;gap:3px;
        background:none;border:1px solid transparent;border-radius:10px;
        padding:10px 18px;cursor:pointer;transition:all .22s;color:${e.color};
      ">
        <div style="font-size:38px;font-weight:700;font-family:'Playfair Display',Georgia,serif">${d.name}</div>
        <div style="font-family:'DM Mono',monospace;font-size:12px;opacity:.45;letter-spacing:1px">${lang === 'pl' ? e.en.name : e.pl.name}</div>
        <div style="font-size:13px;color:#807c74;margin:10px 0">${d.vector}</div>
        <span style="font-size:11px;opacity:.45">${t('touchHint')}</span>
      </button>`;
    } else {
      const e1 = drawResult.e1, e2 = drawResult.e2;
      const d1 = em(e1), d2 = em(e2);
      html += `<div style="display:flex;flex-direction:column;align-items:center;gap:8px;margin-bottom:14px">
        <button onclick="openModal('${e1.id}')" style="display:inline-flex;flex-direction:column;align-items:center;background:none;border:1px solid transparent;border-radius:10px;padding:10px 18px;cursor:pointer;color:${e1.color}">
          <div style="font-size:30px;font-weight:700;font-family:'Playfair Display',Georgia,serif">${d1.name}</div>
          <div style="font-family:'DM Mono',monospace;font-size:11px;opacity:.45">${lang === 'pl' ? e1.en.name : e1.pl.name}</div>
          <span style="font-size:11px;opacity:.45;margin-top:4px">${t('touchHint')}</span>
        </button>
        <div style="font-family:'DM Mono',monospace;font-size:22px;color:#807c74">×</div>
        <button onclick="openModal('${e2.id}')" style="display:inline-flex;flex-direction:column;align-items:center;background:none;border:1px solid transparent;border-radius:10px;padding:10px 18px;cursor:pointer;color:${e2.color}">
          <div style="font-size:30px;font-weight:700;font-family:'Playfair Display',Georgia,serif">${d2.name}</div>
          <div style="font-family:'DM Mono',monospace;font-size:11px;opacity:.45">${lang === 'pl' ? e2.en.name : e2.pl.name}</div>
          <span style="font-size:11px;opacity:.45;margin-top:4px">${t('touchHint')}</span>
        </button>
      </div>`;
      if (drawResult.dyad) {
        html += `<div style="padding:16px 0;border-top:1px solid #1a1a24;margin-bottom:16px">
          <span style="display:block;font-family:'DM Mono',monospace;font-size:10px;color:#807c74;letter-spacing:1px;margin-bottom:3px">${t('dyadLabel')}</span>
          <span style="display:block;font-size:28px;font-weight:700;color:#d4a82a;margin-bottom:5px;font-family:'Playfair Display',Georgia,serif">${drawResult.dyad.name}</span>
          <span style="display:block;font-size:15px;font-style:italic;color:#807c74;font-family:'Playfair Display',Georgia,serif">${t('dyadSub')}</span>
        </div>`;
      }
    }
    html += `<button onclick="drawResult=null;renderDrawView()" style="
      background:none;border:1px solid #2a2a36;color:#807c74;font-size:13px;
      font-weight:500;padding:12px 26px;border-radius:10px;cursor:pointer;min-height:48px;
      transition:all .2s;font-family:Lexend,sans-serif;
    ">${t('drawAgain')}</button>`;
    html += '</div>';
  } else {
    html += `<button class="dv-btn" onclick="handleDraw()" ${spinning ? 'disabled' : ''}>${spinning ? t('drawing') : t('draw')}</button>`;
  }

  html += '</div>';
  cnt.innerHTML = html;
}

function handleDraw() {
  drawResult = null;
  spinning = true;
  renderDrawView();
  setTimeout(() => {
    if (drawMode === 'single') {
      const e = EMOTIONS[Math.floor(Math.random() * EMOTIONS.length)];
      drawResult = { type: 'single', emotion: e, ids: [e.id] };
    } else {
      const e1 = EMOTIONS[Math.floor(Math.random() * EMOTIONS.length)];
      let e2; do { e2 = EMOTIONS[Math.floor(Math.random() * EMOTIONS.length)]; } while (e2.id === e1.id);
      drawResult = { type: 'pair', e1, e2, dyad: getDyad(e1.id, e2.id), ids: [e1.id, e2.id] };
    }
    spinning = false;
    renderDrawView();
  }, 900);
}

// ─── LANGUAGE ───────────────────────────────────────────────────────────────
function setLang(l) {
  lang = l;
  document.documentElement.lang = l;
  document.getElementById('lang-pl').className = l === 'pl' ? 'on' : '';
  document.getElementById('lang-en').className = l === 'en' ? 'on' : '';
  document.querySelector('.app-hdr-top').textContent = t('hdrTop');
  document.getElementById('hdr-title').innerHTML = t('hdrTitle');
  document.getElementById('footer-text').textContent = t('footer');
  // Re-render dyad if present
  if (drawResult && drawResult.type === 'pair') {
    drawResult.dyad = getDyad(drawResult.e1.id, drawResult.e2.id);
  }
  renderNav();
  renderContent();
}

// ─── KEYBOARD ───────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

// ─── INIT ───────────────────────────────────────────────────────────────────
renderNav();
renderContent();
</script>
</body>
</html>
